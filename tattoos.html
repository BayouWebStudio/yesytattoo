  <style>
    
    :root {
      --black: #0a0603;
      --charcoal: #160e06;
      --gold: #B87333;
      --white: #f5f5f0;
      --dim: #888;
      --border: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }
    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: rgba(10,5,5,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
    .nav-links a {
      color: var(--dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .lang-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle:hover { border-color: var(--gold); color: var(--gold); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 1px; background: var(--white); margin: 5px 0; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
    .mobile-menu {
      display: none; position: fixed; top: 65px; left: 0; right: 0; z-index: 99;
      background: var(--charcoal); padding: 24px 48px; border-bottom: 1px solid var(--border);
    }
    .mobile-menu.open { display: block; }
    .mobile-menu a { display: block; color: var(--white); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 0; border-bottom: 1px solid var(--border); }
    /* FLOATING BOOK */
    .book-float {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      background: var(--gold); color: #000;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none; padding: 14px 22px; border-radius: 2px;
      box-shadow: 0 4px 24px rgba(184,115,51,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .book-float:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(184,115,51,0.5); }
    /* FADE-UP ANIMATIONS */
    .fade-up { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    /* FOOTER */
    footer {
      background: var(--charcoal); padding: 48px 72px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-logo { font-family: 'Libre Baskerville', Georgia, serif; font-size: 1.1rem; color: var(--dim); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--dim); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { color: var(--dim); font-size: 0.72rem; }
    /* SHARED */
    .section-label { font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400; line-height: 1.1; margin-bottom: 24px;
    }
    .btn-gold {
      display: inline-block; background: var(--gold); color: #000;
      text-decoration: none; font-size: 0.72rem; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 16px 40px;
      transition: opacity 0.2s;
    }
    .btn-gold:hover { opacity: 0.88; }
    .btn-outline {
      display: inline-block; border: 1px solid var(--border); color: var(--white);
      text-decoration: none; font-size: 0.72rem; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 14px 36px;

    /* MOBILE */
    @media (max-width: 900px) {
      nav { padding: 18px 24px; } .nav-links { display: none; } .hamburger { display: block; }
      footer { flex-direction: column; gap: 24px; padding: 40px 24px; text-align: center; }
    }

    }
  
    .page-hero { padding: 140px 72px 64px; background: var(--charcoal); border-bottom: 1px solid var(--border); }
    .page-eyebrow { font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    h1 { font-family: 'Libre Baskerville', Georgia, serif; font-size: clamp(3rem, 6vw, 5rem); font-weight: 300; line-height: 1; }
    .gallery-body { padding: 72px 72px; max-width: 1400px; margin: 0 auto; }
    .masonry-grid {

    }
    .masonry-item { break-inside: avoid; margin-bottom: 3px; overflow: hidden; }
    .masonry-item img { width: 100%; display: block; filter: brightness(0.85); transition: filter 0.3s; }

    .booking-cta-section { padding: 72px; text-align: center; background: var(--charcoal); }

  <script>
    const LANG = { default: 'en', current: 'en' };
    function toggleLang() {
      LANG.current = LANG.current === 'es' ? 'en' : 'es';
      document.querySelectorAll('[data-es][data-en]').forEach(el => {
        el.textContent = el.getAttribute('data-' + LANG.current) || el.textContent;
      });
      document.querySelectorAll('[data-es-href][data-en-href]').forEach(el => {
        el.setAttribute('href', el.getAttribute('data-' + LANG.current + '-href') || el.getAttribute('href'));
      });
    }
    // Apply language on page load
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('[data-es][data-en]').forEach(el => {
        el.textContent = el.getAttribute('data-' + LANG.current) || el.textContent;
      });
    });

    // Fade-up on scroll
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  </script>
